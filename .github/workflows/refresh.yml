name: Refresh radar data

# Regenerates data.json weekly (and on manual trigger) and commits it.
# Set the PERPLEXITY_API_KEY repo secret first:
#   Settings → Secrets and variables → Actions → New repository secret
on:
  schedule:
    - cron: "0 4 * * 1"   # Mondays 04:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: "Lookback window in days"
        default: "7"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run pipeline
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: python pipeline/refresh.py --days "${{ github.event.inputs.days || '7' }}"
      - name: Commit refreshed data
        run: |
          git config user.name "deeptech-radar bot"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: refresh radar data $(date -u +%Y-%m-%d)"
          git push
